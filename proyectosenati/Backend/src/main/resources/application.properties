# Nombre de la aplicación
spring.application.name=proyectosenati

# CONEXION A MYSQL
spring.datasource.url=jdbc:mysql://localhost:3306/proyectosenati
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.MySQLDialesct

# Puerto del servidor
server.port=8080